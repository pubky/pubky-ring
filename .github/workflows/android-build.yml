name: Android Build

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: clear yarn and gradle caches
      run: |
        rm -rf ~/.yarn
        rm -rf ~/.gradle

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        #cache: 'yarn'

    - name: Yarn Install
      run: yarn || yarn
      env:
        HUSKY: 0

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    # - name: Set up Android SDK
    #   uses: android-actions/setup-android@v3
      
