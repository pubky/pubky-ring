name: iOS Build

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    concurrency:
      group: ios-build-${{ github.head_ref }}
      cancel-in-progress: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26"

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'yarn'

    - name: Install dependencies
      run: |
        yarn cache clean
        yarn install --frozen-lockfile

    - name: Cache CocoaPods
      uses: actions/cache@v5
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock', 'package.json', 'yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Install iOS dependencies
      run: |
        cd ios
        pod install

    - name: Clean build
      run: |
        cd ios
        xcodebuild clean -workspace pubkyring.xcworkspace -scheme pubkyring

    - name: Build iOS App
      run: |
        cd ios
        xcodebuild -workspace pubkyring.xcworkspace -scheme pubkyring -configuration Release -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.2' -derivedDataPath ./build build

    - name: Create app bundle zip
      run: |
        cd ios/build/Build/Products/Release-iphonesimulator
        zip -r pubkyring.app.zip pubkyring.app

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ios-release-app
        path: ios/build/Build/Products/Release-iphonesimulator/pubkyring.app.zip
        retention-days: 7
