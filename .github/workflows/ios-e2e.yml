name: iOS E2E

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Commit SHA to build/test (leave empty to use selected branch)'
        required: false
        type: string

concurrency:
  group: ios-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 75

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.inputs.commit-sha || github.ref }}

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26"

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'yarn'

    - name: Verify iOS toolchain
      run: |
        xcodebuild -version
        xcodebuild -showsdks
        xcrun simctl list runtimes
        xcrun simctl list devices available

    - name: Install dependencies
      run: |
        yarn cache clean
        yarn install --frozen-lockfile

    - name: Cache CocoaPods
      uses: actions/cache@v5
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock', 'package.json', 'yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Install iOS dependencies
      run: |
        cd ios
        pod install

    - name: Clean build
      run: |
        cd ios
        xcodebuild clean -workspace pubkyring.xcworkspace -scheme pubkyring

    - name: Build iOS App
      run: |
        cd ios
        xcodebuild -workspace pubkyring.xcworkspace -scheme pubkyring -configuration Release -destination 'platform=iOS Simulator,name=iPhone 17' -derivedDataPath ./build build

    - name: Create app bundle zip
      run: |
        cd ios/build/Build/Products/Release-iphonesimulator
        zip -r pubkyring.app.zip pubkyring.app

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ios-release-app
        path: ios/build/Build/Products/Release-iphonesimulator/pubkyring.app.zip
        retention-days: 7

  ios-e2e:
    runs-on: macos-26
    needs: build
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.inputs.commit-sha || github.ref }}

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26"

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Install Appium drivers
      run: yarn e2e:drivers

    - name: Verify Appium drivers
      run: APPIUM_HOME=./e2e/.appium npx appium driver list --installed

    - name: Download iOS App
      uses: actions/download-artifact@v7
      with:
        name: ios-release-app
        path: ./artifacts

    - name: Extract iOS App Bundle
      run: |
        cd artifacts
        unzip pubkyring.app.zip
        ls -la

    - name: Run E2E tests
      timeout-minutes: 45
      env:
        IOS_APP: ./artifacts/pubkyring.app
        IOS_SIM: iPhone 17
        RECORD_VIDEO: 'true'
        HOMESERVER_ADMIN_PASSWORD: ${{ secrets.HOMESERVER_ADMIN_PASSWORD }}
      run: yarn e2e:ios

    - name: Upload Video
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ios-e2e-video
        path: ./e2e/artefacts/
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload Logcat
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ios-e2e-logcat
        path: ./logcat.txt
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload Simulator Logs
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ios-e2e-simulator-logs
        path: ./ios-simulator-logs.txt
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload Test Results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ios-e2e-results
        path: |
          ./e2e/results/
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload Appium Logs
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ios-e2e-appium-logs
        path: ./e2e/appium.log
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload WDIO Logs
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ios-e2e-wdio-logs
        path: ./e2e/wdio-logs/
        if-no-files-found: ignore
        retention-days: 7
