appId: ${APP_ID}
name: create-pubky-default-homeserver
---
- launchApp:
    clearState: true
- runFlow: ../shared/onboarding.yaml
- runFlow: ../shared/create-pubky.yaml
- assertVisible:
    id: HomeserverDefaultRadioInner
- assertNotVisible:
    id: HomeserverCustomRadioInner
- tapOn:
    id: HomeserverContinueButton
- tapOn:
    id: InviteCodeInput
- inputText: ABCD1234EFGH
- assertVisible: ABCD-1234-EFGH
- pressKey: Enter
- extendedWaitUntil:
    visible:
      id: InviteCodeErrorText
    timeout: 120000
